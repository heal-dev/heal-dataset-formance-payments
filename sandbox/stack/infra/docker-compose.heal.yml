# Heal sandbox override for the `onboard-connector-basic` journey.
#
# Additive changes to payments/docker-compose.yml (never edit that file):
#  1. Run server + worker with `-tags it` so the dummypay connector's real
#     install+polling workflow is compiled in (its non-`it` install returns
#     ErrNotImplemented — see internal/connectors/plugins/public/dummypay/install.go).
#  2. Mount the Heal dummypay fixture directory (accounts.json / balances.json)
#     read-write at /dummypay, which the connector is installed pointing at.
#  3. Project-scope the two fixed-name temporal aux containers. The base compose
#     hardcodes container_name: temporal-ui / temporal-admin-tools (no project
#     prefix), so re-running collides with leftovers from a prior run. We rename
#     them under the sandbox project so they never clash with anything else.
#
# Applied via: docker compose -f docker-compose.yml -f <this file> ...
# (infra-up.sh wires both files together and exports HEAL_FIXTURES_DIR.)
#
# NB: relative volume paths in an override resolve against the PROJECT directory
# (the first -f file's dir = payments/), NOT this file's dir — so we take the
# fixtures dir as an absolute path via HEAL_FIXTURES_DIR.
services:
  payments:
    command: go run -tags it ./ server
    volumes:
      - ${HEAL_FIXTURES_DIR:?set HEAL_FIXTURES_DIR to sandbox/stack/infra/dummypay-fixtures}:/dummypay:rw

  payments-worker:
    command: go run -tags it ./ worker
    volumes:
      - ${HEAL_FIXTURES_DIR:?set HEAL_FIXTURES_DIR to sandbox/stack/infra/dummypay-fixtures}:/dummypay:rw

  # Project-scoped names so reruns don't collide on the base compose's fixed names.
  temporal-ui:
    container_name: formance-payments-sbx-temporal-ui
  temporal-admin-tools:
    container_name: formance-payments-sbx-temporal-admin-tools
